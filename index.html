    const container = document.getElementById('categories');
    const searchInput = document.getElementById('search');

    function renderCategories(filter = '') {
      container.innerHTML = '';
      let totalVisible = 0;
      const filterLower = filter.toLowerCase();

      for (const [category, commands] of Object.entries(commandsData)) {
        const filteredCommands = commands.filter(([key]) => key.toLowerCase().includes(filterLower));
        if (filteredCommands.length === 0) continue;

        totalVisible += filteredCommands.length;
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        categoryDiv.innerHTML = `<h2>${category}</h2>`;
        const listDiv = document.createElement('div');
        listDiv.className = 'command-list';

        filteredCommands.forEach(([key, example]) => {
          const card = document.createElement('div');
          card.className = 'command-card';
          card.innerHTML = `<div class="command-name">${key}</div>
                            <div class="command-example">${example}</div>`;
          listDiv.appendChild(card);
        });

        categoryDiv.appendChild(listDiv);
        container.appendChild(categoryDiv);
      }

      if (totalVisible === 0) {
        container.innerHTML = '<div class="no-results">😕 Ничего не найдено</div>';
      }
    }

    renderCategories();

    searchInput.addEventListener('input', (e) => {
      renderCategories(e.target.value);
    });
